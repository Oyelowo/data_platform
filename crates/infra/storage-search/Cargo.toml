[package]
name = "storage-search"
version.workspace = true
edition.workspace = true
authors.workspace = true
description = "Durable full-text search engine with inverted index, BM25 ranking, and segment-based persistence."
license.workspace = true

[dependencies]
storage-traits = { path = "../storage-traits" }
storage-file = { path = "../storage-file" }
storage-format = { path = "../storage-format" }
storage-wal = { path = "../storage-wal" }
storage-compression = { path = "../storage-compression" }
storage-metrics = { path = "../storage-metrics" }
bytes = "1.10"
thiserror = "2.0"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
bincode = "1.3"
parking_lot = "0.12"
unicode-segmentation = "1.12"
crossbeam-channel = "0.5"

[dev-dependencies]
storage-testkit = { path = "../storage-testkit" }
tempfile = "3.19"
proptest = "1.6"

[lints.rust]
unexpected_cfgs = { level = "warn", check-cfg = ['cfg(loom)'] }
