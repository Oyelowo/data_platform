[package]
name = "storage-kv"
version.workspace = true
edition.workspace = true
authors.workspace = true
description = "Persistent LSM-tree key-value storage engine."
license.workspace = true

[dependencies]
storage-traits = { path = "../storage-traits" }
storage-skipmap = { path = "../storage-skipmap" }
storage-wal = { path = "../storage-wal" }
storage-file = { path = "../storage-file" }
storage-format = { path = "../storage-format" }
storage-filter = { path = "../storage-filter" }
storage-compression = { path = "../storage-compression" }
bytes = "1.10"
thiserror = "2.0"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
bincode = "1.3"
crossbeam-channel = "0.5"
libc = "0.2"

[dev-dependencies]
storage-testkit = { path = "../storage-testkit" }
tempfile = "3.19"
proptest = "1.6"
proptest-state-machine = "0.3"
