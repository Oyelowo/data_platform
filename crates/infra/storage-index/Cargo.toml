[package]
name = "storage-index"
version = "0.1.0"
edition = "2024"
authors = ["Oyelowo Oyedayo <oyelowo.oss@gmail.com>"]
description = "Durable secondary-index storage engine implementing storage_traits::IndexedEngine."
license = "MIT OR Apache-2.0"

[dependencies]
storage-traits = { path = "../storage-traits" }
bytes = "1.10"
thiserror = "2.0"
serde = { version = "1.0", features = ["derive"] }
bincode = "1.3"
parking_lot = "0.12"

[dev-dependencies]
storage-memory = { path = "../storage-memory" }
storage-testkit = { path = "../storage-testkit" }
tempfile = "3.19"
